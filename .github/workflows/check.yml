name: Check

on:
  push:
  pull_request:
    branches:
      - main

env:
  # pnpm/action-setup@v4 still ships on Node 20; opt into Node 24 explicitly
  # so the upcoming runner default flip (June 2026) is a no-op for us.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first so workspace subpath exports (e.g. @agent-connect/bot/service,
      # @agent-connect/bot/hookClient) resolve to dist/*.d.ts. Without this the
      # CLI package's typecheck fails to find those modules.
      - run: pnpm build

      - run: pnpm typecheck
      - run: pnpm test:ts
